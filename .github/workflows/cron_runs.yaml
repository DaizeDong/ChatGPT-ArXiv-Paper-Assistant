name: Run daily arxiv

on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron: '0 5 * * *'
  workflow_dispatch:


permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Restore X authority inventory from `auto_update`
        shell: bash
        run: |
          if git ls-remote --exit-code --heads origin auto_update >/dev/null 2>&1; then
            git fetch origin auto_update:auto_update_tmp
            if git cat-file -e auto_update_tmp:configs/hotspot/x_authority_inventory.json 2>/dev/null; then
              mkdir -p configs/hotspot
              git show auto_update_tmp:configs/hotspot/x_authority_inventory.json > configs/hotspot/x_authority_inventory.json
              echo "Restored X authority inventory from auto_update."
            else
              echo "auto_update does not contain configs/hotspot/x_authority_inventory.json yet."
            fi
            git branch -D auto_update_tmp >/dev/null 2>&1 || true
          else
            echo "auto_update branch does not exist yet."
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Refresh model pricing cache
        run: |
          python scripts/refresh_model_pricing.py --max-age-hours 24

      - name: Run main
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          SLACK_KEY: ${{ secrets.SLACK_KEY }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          python main.py

      - name: Generate daily hotspots
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_daily_hotspots.py --output-root out --mode auto --force

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: arxiv-scanner-outputs
          path: out/
          retention-days: 5
