name: Run daily arxiv

on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron: '0 5 * * *'
  workflow_dispatch:


permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Refresh model pricing cache
        run: |
          python scripts/refresh_model_pricing.py --max-age-hours 24

      - name: Run main
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          SLACK_KEY: ${{ secrets.SLACK_KEY }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          python main.py

      - name: Generate daily hotspots
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_daily_hotspots.py --output-root out --mode auto --force

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: arxiv-scanner-outputs
          path: out/
          retention-days: 5
