name: Publish Github Pages (Multiple)

on:
  workflow_dispatch:
  push:
    branches:
      - test_web

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout `test_web` branch
        uses: actions/checkout@v3
        with:
          ref: test_web
          fetch-depth: 0

      - name: Verify output directory and contents
        run: |
          if [ -d "out/site" ] && [ "$(ls -A out/site)" ]; then
              echo "Contents in out/site:"
              ls -R out/site
              cp -R out/site/. .
          else
              echo "out/site directory is empty or does not exist. Aborting."
              exit 1
          fi

      - name: Collect site markdown files
        id: collect_files
        shell: bash
        run: |
          {
            echo 'files<<EOF'
            find . -name 'index.md' \
              -not -path './out/*' \
              -not -path './.git/*' \
              | sort \
              | sed 's#^\./##'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Convert site markdown to pages
        uses: wranders/markdown-to-pages-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ${{ steps.collect_files.outputs.files }}

      - name: Copy static assets
        shell: bash
        run: |
          if [ -d assets ]; then
            mkdir -p dist
            cp -R assets dist/
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
