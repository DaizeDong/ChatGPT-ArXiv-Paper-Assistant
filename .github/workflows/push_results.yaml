name: Push Generated Results

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ "Run daily arxiv" ]
    types:
      - completed

permissions:
  contents: write

jobs:
  push-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download artifact
        id: download-artifact
        uses: dawidd6/action-download-artifact@v19
        with:
          workflow: cron_runs.yaml
          workflow_conclusion: success
          name: arxiv-scanner-outputs
          path: artifact_out/

      - name: Verify artifact /out directory and contents
        run: |
          if [ -d "artifact_out/out" ] && [ "$(ls -A artifact_out/out)" ]; then
              echo "ARTIFACT_OUT=artifact_out/out" >> "$GITHUB_ENV"
              echo "Contents in artifact_out/out:"
              ls -la artifact_out/out/
          elif [ -d "artifact_out" ] && [ "$(ls -A artifact_out)" ]; then
              echo "ARTIFACT_OUT=artifact_out" >> "$GITHUB_ENV"
              echo "Contents in artifact_out:"
              ls -la artifact_out/
          else
              echo "artifact_out directory is empty or does not exist. Aborting."
              exit 1
          fi

      - name: Remove CI-only site build outputs
        run: |
          rm -rf "${ARTIFACT_OUT}/site" "${ARTIFACT_OUT}/site_html" "${ARTIFACT_OUT}/site_preview"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Generate monthly summaries
        if: ${{ !cancelled() }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          python scripts/generate_monthly_summaries.py --output-root "${ARTIFACT_OUT}"

      - name: Checkout to `auto_update` Branch
        run: |
          git fetch origin
          if ! git show-ref --verify --quiet refs/remotes/origin/auto_update; then
            echo "auto_update branch does not exist. Creating it from main."
            git checkout -b auto_update origin/main
            git push origin auto_update
          else
            echo "auto_update branch exists. Checking out to it."
            git checkout -b auto_update origin/auto_update
          fi

      - name: Replace tracked /out with processed artifact contents
        run: |
          rm -rf out
          mv "${ARTIFACT_OUT}" out

#      - name: Debug via Browser
#        uses: fawazahmed0/action-debug-vscode@main
#        with:
#          token: "root"

      - name: Check for changes in /out folder
        id: check_changes
        run: |
          git add out/
          echo "Checking for changes in /out directory..."
          git status
          if git diff --cached --quiet; then
            echo "No changes detected in /out."
            echo "has_changes=false" >> $GITHUB_ENV
          else
            echo "Changes detected in /out."
            echo "has_changes=true" >> $GITHUB_ENV
          fi

      - name: Commit and push /out folder
        if: env.has_changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "[skip ci] Automated update from workflow: $(date +"%Y-%m-%d %H:%M:%S")"
          git push origin HEAD:auto_update
          echo "Changes in /out pushed to the repository."
