[SELECTION]
# ==== author matching ====
# this will take a lot of time...
run_author_match = true
# the score assigned to papers filtered by author matching, this influences the final ranking of papers (20 means always rank top)
author_match_score = 20

# ==== gpt matching ====
run_openai = true
run_title_filter = true
run_abstract_filter = true
model = gpt-5.4

# number of calls to gpt per minute (-1 denotes no limit)
limit_per_minute = -1

# cost quality tradeoff - larger batches are cheaper but less accurate.
title_batch_size = 32
abstract_batch_size = 16
adaptive_batch_size = true
adaptive_threshold = 32

# number of retries for papers failed to be filtered/selected by gpt
title_retry = 3
abstract_retry = 3

[FILTERING]
# https://arxiv.org/category_taxonomy
arxiv_category = cs.LG,cs.AI
# type of papers on arxiv to preserve: new, cross, replace, replace-cross.
announce_type = new,cross
force_primary = false
h_cutoff = 10
relevance_cutoff = 8
novelty_cutoff = 7

[OUTPUT]
debug_messages = false
output_path = out/
dump_debug_file = false
dump_json = true
dump_md = true
push_to_slack = false

[MONTHLY_SUMMARY]
enabled = true
model = gpt-5.4
batch_size = 12
retry = 3
target_total_papers = 48
max_papers_per_category = 12
fallback_score_cutoff = 17
fallback_relevance_cutoff = 9
fallback_novelty_cutoff = 8

[HOTSPOTS]
enabled = true
mode = auto
model_screen = gpt-5.4
model_summarize = gpt-5.4
retry = 3
freshness_hours = 36
target_topics = 5
min_topics = 3
target_watchlist_topics = 3
target_items_per_topic = 4
max_raw_items = 120
max_clusters_for_llm = 18
screen_batch_size = 8
screening_score_cutoff = 4.0
watchlist_score_cutoff = 3.6
source_registry_path = configs/hotspot_roundup_sites.json

[HOTSPOT_SOURCES]
use_local_papers = true
use_hf_papers = true
use_ainews = true
use_official_blogs = true
use_roundup_sites = true
use_github = false
use_hn = false
reuse_cached_raw = true
local_papers_max_staleness_days = 2
hf_result_limit = 24

[HOTSPOT_GITHUB]
search_queries = llm,agent,reasoning,multimodal,moe,quantization,benchmark,open-source model
stars_cutoff = 20
created_within_days = 10
result_limit = 30

[HOTSPOT_HN]
keyword_filter = llm,openai,anthropic,deepmind,gemini,agent,reasoning,benchmark,arxiv,model,transformer
story_limit = 80
