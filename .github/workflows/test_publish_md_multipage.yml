name: Publish Github Pages (Multiple)

on:
  workflow_dispatch:
  push:
    branches:
      - test_web

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-multipage
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout `test_web` branch
        uses: actions/checkout@v6
        with:
          ref: test_web
          fetch-depth: 0

      - name: Verify output directory and contents
        run: |
          if [ -d "out/site" ] && [ "$(ls -A out/site)" ]; then
              echo "Contents in out/site:"
              ls -R out/site
              cp -R out/site/. .
          else
              echo "out/site directory is empty or does not exist. Aborting."
              exit 1
          fi

      - name: Collect site markdown files
        id: collect_files
        shell: bash
        run: |
          {
            echo 'files<<EOF'
            find . -name 'index.md' \
              -not -path './out/*' \
              -not -path './.git/*' \
              | sort \
              | sed 's#^\./##'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Convert site markdown to pages
        uses: wranders/markdown-to-pages-action@v1.1.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          custom_css: site.css
          files: ${{ steps.collect_files.outputs.files }}

      - name: Copy static assets
        shell: bash
        run: |
          if [ -d assets ]; then
            mkdir -p dist
            cp -R assets dist/
          fi

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4.0.5
        id: deployment
