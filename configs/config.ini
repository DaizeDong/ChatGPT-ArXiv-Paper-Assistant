[SELECTION]
# ==== author matching ====
# this will take a lot of time...
run_author_match = false
# the score assigned to papers filtered by author matching, this influences the final ranking of papers (20 means always rank top)
author_match_score = 20

# ==== gpt matching ====
run_openai = true
run_title_filter = true
run_abstract_filter = true
model = gpt-5.4

# number of calls to gpt per minute (-1 denotes no limit)
limit_per_minute = -1

# cost quality tradeoff - larger batches are cheaper but less accurate.
title_batch_size = 32
abstract_batch_size = 16
adaptive_batch_size = true
adaptive_threshold = 32

# number of retries for papers failed to be filtered/selected by gpt
title_retry = 3
abstract_retry = 3

[FILTERING]
# https://arxiv.org/category_taxonomy
arxiv_category = cs.LG,cs.AI
# type of papers on arxiv to preserve: new, cross, replace, replace-cross.
announce_type = new,cross
force_primary = false
h_cutoff = 10
relevance_cutoff = 8
novelty_cutoff = 8

[OUTPUT]
debug_messages = false
output_path = out/
dump_debug_file = false
dump_json = true
dump_md = true
push_to_slack = false

[MONTHLY_SUMMARY]
enabled = true
model = gpt-5.4
batch_size = 12
retry = 3
target_total_papers = 48
max_papers_per_category = 12
fallback_score_cutoff = 17
fallback_relevance_cutoff = 9
fallback_novelty_cutoff = 8

[HOTSPOTS]
enabled = true
mode = auto
model_screen = gpt-5.4
model_summarize = gpt-5.4
retry = 3
freshness_hours = 36
target_topics = 5
min_topics = 3
target_watchlist_topics = 3
target_category_topics = 32
max_topics_per_category = 12
target_items_per_topic = 4
max_raw_items = 240
max_clusters_for_llm = 18
max_clusters_for_radar = 96
max_review_clusters = 10
screen_batch_size = 10
screening_score_cutoff = 4.0
watchlist_score_cutoff = 3.3
screening_auto_keep_score_cutoff = 6.8
screening_auto_keep_confidence_cutoff = 6.4
screening_auto_keep_evidence_cutoff = 5.4
screening_auto_watchlist_score_cutoff = 4.6
screening_auto_watchlist_confidence_cutoff = 5.4
screening_auto_drop_score_cutoff = 2.8
screening_auto_drop_confidence_cutoff = 3.6
screening_auto_drop_evidence_cutoff = 3.2
screening_heuristic_only_score_cutoff = 5.8
screening_heuristic_only_confidence_cutoff = 5.0
screening_heuristic_only_evidence_cutoff = 3.4
category_display_score_cutoff = 2.2
target_long_tail_topics = 18
max_long_tail_per_category = 8
long_tail_display_score_cutoff = 1.6
paper_spotlight_max_daily_hot = 6
paper_spotlight_max_new_frontier = 4
paper_spotlight_daily_hot_score_cutoff = 15
paper_spotlight_daily_hot_relevance_cutoff = 7
paper_spotlight_new_frontier_score_cutoff = 15
paper_spotlight_new_frontier_novelty_cutoff = 8
source_registry_path = configs/hotspot/roundup_sites.json

[HOTSPOT_SOURCES]
use_local_papers = true
use_hf_papers = true
use_ainews = true
use_official_blogs = true
use_roundup_sites = true
use_analysis_feeds = true
use_reddit = true
use_x_ainews_twitter = true
use_x_paperpulse = true
use_x_official = true
use_github = true
use_hn = true
reuse_cached_raw = true
local_papers_max_staleness_days = 2
hf_result_limit = 12

[HOTSPOT_X]
authority_seeds_path = configs/hotspot/x_authority_seeds.json
authority_inventory_path = configs/hotspot/x_authority_inventory.json
authority_registry_max_age_hours = 24
list_result_limit = 80
official_batch_size = 10
researcher_batch_size = 8
paperpulse_result_limit = 20

[HOTSPOT_GITHUB]
search_queries = llm,agent,reasoning,multimodal,moe,quantization,benchmark,open-source model,language model,transformer,neural network
stars_cutoff = 80
created_within_days = 5
result_limit = 15

[HOTSPOT_HN]
keyword_filter = llm,openai,anthropic,deepmind,gemini,agent,reasoning,benchmark,arxiv,model,transformer
story_limit = 80
score_cutoff = 30
comments_cutoff = 8
