name: Publish Github Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ "Push Generated Results" ]
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish_md.yml"
      - "site.css"
      - "arxiv_assistant/renderers/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout `main` branch for site code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Checkout `auto_update` branch for generated outputs
        uses: actions/checkout@v6
        with:
          ref: auto_update
          path: auto_update_data
          fetch-depth: 0

      - name: Restore published data snapshot
        shell: bash
        run: |
          rm -rf out
          if [ -d "auto_update_data/out" ] && [ "$(ls -A auto_update_data/out)" ]; then
            cp -R auto_update_data/out ./out
            echo "Contents in restored out/:"
            ls -R out
          else
            echo "auto_update_data/out is empty or does not exist. Aborting."
            exit 1
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build multipage site
        run: |
          python -m arxiv_assistant.renderers.build_multipage_site

      - name: Render static site
        run: |
          python -m arxiv_assistant.renderers.render_static_site --site-root out/site --dist-root dist --css-source site.css

      - name: Bust custom CSS cache
        shell: bash
        run: |
          find dist -name '*.html' -exec \
            sed -i "s#site\\.css\\([\"']\\)#site.css?v=${GITHUB_SHA}\\1#g" {} +

      - name: Copy static assets
        shell: bash
        run: |
          if [ -d assets ]; then
            mkdir -p dist
            cp -R assets dist/
          fi

      - name: Archive Pages artifact
        shell: bash
        run: |
          tar \
            --dereference --hard-dereference \
            --directory "dist" \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4.0.5
        id: deployment
